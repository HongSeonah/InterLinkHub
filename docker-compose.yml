services:
  mysql:
    image: mysql:8.4
    container_name: interlinkhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-interlinkhub}
      MYSQL_USER: ${MYSQL_USER:-interlinkhub}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-interlinkhub123!}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123!}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interlinkhub-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-interlinkhub}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-interlinkhub}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-interlinkhub123!}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-before-deploy}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-240}
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data:
